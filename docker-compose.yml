services:
  backend:
    build:
      context: ./backend
      target: production
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - FRONTEND_URL=http://localhost:3000
      - WS_PATH=/socket.io/
    networks:
      - bunker-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: production
    ports:
      - "3000:80"
    environment:
      - WS_PATH=/socket.io/
    networks:
      - bunker-network
    restart: unless-stopped

networks:
  bunker-network:
    driver: bridge
