services:
  casdoor:
    image: casbin/casdoor:latest
    restart: unless-stopped
    ports:
      - "${CASDOOR_PORT:-8000}:8000"
    environment:
      - RUNNING_IN_DOCKER=true
      - CASDOOR_PUBLIC_PORT=${CASDOOR_PORT:-8000}
      - CASDOOR_PUBLIC_DOMAIN=localhost:${CASDOOR_PORT:-8000}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bunker-network
    volumes:
      - ./casdoor/conf:/conf

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${DATABASE_USER:-postgres}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD:-postgres}
      - POSTGRES_DB=${DATABASE_NAME:-bunker}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bunker-network

  backend:
    build:
      context: ./backend
      target: production
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - FRONTEND_URL=${FRONTEND_DOMAIN:-http://localhost:3000}
      - WS_PATH=${WS_PATH:-/socket.io/}
      - API_PREFIX=${API_PREFIX:-/api}
      - CASDOOR_URL=${CASDOOR_URL:-http://casdoor:8000}
      - CASDOOR_CLIENT_ID=${CASDOOR_CLIENT_ID:-bunker-frontend}
      - CASDOOR_CLIENT_SECRET=${CASDOOR_CLIENT_SECRET:-your-client-secret-here}
      - CASDOOR_APP_NAME=${CASDOOR_APP_NAME:-bunker}
      - CASDOOR_ORG_NAME=${CASDOOR_ORG_NAME:-bunker}
      - CASDOOR_ENDPOINT=${CASDOOR_ENDPOINT:-http://casdoor:8000}
      - CASDOOR_CERT=${CASDOOR_CERT}
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/bunker?connection_limit=10}
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=${DATABASE_NAME:-bunker}
      - DATABASE_USER=${DATABASE_USER:-postgres}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-postgres}
      - BUNKER_CONFIG=/app/config.toml
    volumes:
      - ./config.toml:/app/config.toml:ro
    depends_on:
      - postgres
      - casdoor
    networks:
      - bunker-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: production
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NUXT_PUBLIC_WS_URL=${BACKEND_DOMAIN:-http://localhost:3001}
      - NUXT_PUBLIC_WS_PATH=${WS_PATH:-/socket.io/}
      - NUXT_PUBLIC_CASDOOR_URL=${CASDOOR_URL:-http://localhost:8000}
      - NUXT_PUBLIC_CASDOOR_CLIENT_ID=${CASDOOR_CLIENT_ID:-bunker-frontend}
      - NUXT_PUBLIC_CASDOOR_APP_NAME=${CASDOOR_APP_NAME:-bunker}
      - NUXT_PUBLIC_CASDOOR_ORG_NAME=${CASDOOR_ORG_NAME:-bunker}
      - NUXT_PUBLIC_BACKEND_URL=${BACKEND_DOMAIN:-http://localhost:3001}
      - BUNKER_CONFIG=/app/config.toml
    volumes:
      - ./config.toml:/app/config.toml:ro
    depends_on:
      - backend
      - casdoor
    networks:
      - bunker-network
    restart: unless-stopped

volumes:
  postgres_data:
  casdoor-conf:

networks:
  bunker-network:
    driver: bridge
