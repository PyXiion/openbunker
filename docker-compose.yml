services:
  zitadel:
    image: ghcr.io/zitadel/zitadel:latest
    command: 'start-from-init --masterkey "MasterkeyNeedsToBeChanged" --tlsMode disabled'
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ZITADEL_DATABASE_POSTGRES_HOST=postgres
      - ZITADEL_DATABASE_POSTGRES_PORT=5432
      - ZITADEL_DATABASE_POSTGRES_DATABASE=zitadel
      - ZITADEL_DATABASE_POSTGRES_USER=zitadel
      - ZITADEL_DATABASE_POSTGRES_PASSWORD=zitadel
      - ZITADEL_DATABASE_POSTGRES_ADMIN_USER=postgres
      - ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD=postgres
      - ZITADEL_FIRSTINSTANCE_ORG_MACHINE_USERNAME= zitadel
      - ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PASSWORD= zitadel
      - ZITADEL_FIRSTINSTANCE_ORG_MACHINE_HUMAN_USERNAME= admin@bunker.local
      - ZITADEL_FIRSTINSTANCE_ORG_MACHINE_HUMAN_PASSWORD= AdminPassword123!
      - ZITADEL_FIRSTINSTANCE_ORG_NAME= Bunker Game
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bunker-network

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=zitadel
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    networks:
      - bunker-network

  backend:
    build:
      context: ./backend
      target: production
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - FRONTEND_URL=http://localhost:3000
      - WS_PATH=/socket.io/
      # Use h2c for HTTP/2 cleartext (development) or https for production
      - ZITADEL_URL=http://zitadel:8080
      - ZITADEL_CLIENT_ID=bunker-frontend
      - ZITADEL_CLIENT_SECRET=your-client-secret-here
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/bunker
    depends_on:
      - postgres
      - zitadel
    networks:
      - bunker-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: production
    ports:
      - "3000:80"
    environment:
      - WS_PATH=/socket.io/
      - ZITADEL_URL=http://localhost:8080
      - ZITADEL_CLIENT_ID=bunker-frontend
      - BACKEND_URL=http://localhost:3001
    depends_on:
      - backend
      - zitadel
    networks:
      - bunker-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  bunker-network:
    driver: bridge
